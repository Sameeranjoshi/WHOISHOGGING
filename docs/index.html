<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CHPC GPU Finder</title>
  <link rel="stylesheet" href="./styles.css?v=5" />
</head>
<body>
  <main class="shell">
    <header class="topbar">
      <div class="titleBlock">
        <p class="eyebrow">University of Utah CHPC</p>
        <h1>CHPC GPU Finder</h1>
        <p class="heroText" id="viewHint"></p>
      </div>
      <div class="topbarActions">
        <nav class="tabs" id="tabNav" aria-label="Main views">
          <button class="tabButton active" data-view="free">Find GPUs</button>
          <button class="tabButton" data-view="hogging">Who Is Hogging</button>
        </nav>
        <div class="refreshGroup">
          <button class="refreshButton" id="refreshButton" type="button">Refresh</button>
          <div class="nextRefresh" id="nextRefresh"></div>
        </div>
      </div>
    </header>

    <section class="toolbar">
      <div class="toolbarRow">
        <div>
          <div class="filterLabel">GPU Type</div>
          <div class="gpuFilters" id="gpuFilters"></div>
        </div>
        <div class="dataStamp" id="dataStamp"></div>
      </div>
      <div class="toolbarRow analysisRow">
        <div>
          <div class="filterLabel">Analysis</div>
          <div class="analysisFilters" id="analysisFilters"></div>
        </div>
      </div>
    </section>

    <section class="statsGrid" id="statsGrid"></section>

    <section class="panel">
      <div class="panelHeader">
        <h2 id="primaryTitle">Find GPUs</h2>
        <div class="resultMeta" id="resultMeta"></div>
      </div>
      <div class="tableWrap">
        <table>
          <thead>
            <tr id="primaryHead"></tr>
          </thead>
          <tbody id="primaryBody"></tbody>
        </table>
      </div>
    </section>

    <section class="panel hidden" id="summaryPanel">
      <div class="panelHeader">
        <h2 id="summaryTitle">Total GPU allocation per user</h2>
      </div>
      <div class="tableWrap">
        <table>
          <thead>
            <tr id="summaryHead"></tr>
          </thead>
          <tbody id="summaryBody"></tbody>
        </table>
      </div>
    </section>

    <section class="commandPanel">
      <div class="panelHeader">
        <h2>salloc</h2>
        <div class="commandHint">Click a GPU row above to update this command.</div>
      </div>
      <code id="sallocCommand"></code>
    </section>
  </main>
  <script src="./config.js?v=5"></script>
  <script src="./app.js?v=5"></script>
</body>
</html>
